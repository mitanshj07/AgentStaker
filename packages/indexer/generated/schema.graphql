  forecasts(agent: String!, marketId: BigInt!): forecasts
  forecastss(where: forecastsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): forecastsPage!
  oracleCases(marketId: BigInt!): oracleCases
  oracleCasess(where: oracleCasesFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): oracleCasesPage!
  protocolEvents(id: String!): protocolEvents
  protocolEventss(where: protocolEventsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): protocolEventsPage!
  betSlips(id: BigInt!): betSlips
  betSlipss(where: betSlipsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): betSlipsPage!
  socialMarkets(id: BigInt!): socialMarkets
  socialMarketss(where: socialMarketsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): socialMarketsPage!
  battleResults(id: BigInt!): battleResults
  battleResultss(where: battleResultsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): battleResultsPage!
  signals(id: BigInt!): signals
  signalss(where: signalsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): signalsPage!
  fantasyEntries(contestId: BigInt!, user: String!): fantasyEntries
  fantasyEntriess(where: fantasyEntriesFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): fantasyEntriesPage!
